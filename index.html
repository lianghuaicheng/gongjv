// 状态
let currentCategory = 'all';
let currentSearch = '';
let toolHistory = [];

// 初始化
document.addEventListener('DOMContentLoaded', () => {
    initCounts();
    handleRoute();
    setupEventListeners();
});

// 初始化计数
function initCounts() {
    const counts = { all: TOOLS.length, ai: 0, dev: 0, design: 0 };
    TOOLS.forEach(t => counts[t.category]++);
    document.getElementById('countAll').textContent = counts.all;
    document.getElementById('countAi').textContent = counts.ai;
    document.getElementById('countDev').textContent = counts.dev;
    document.getElementById('countDesign').textContent = counts.design;
}

// 设置事件监听
function setupEventListeners() {
    // 搜索
    document.getElementById('searchInput').addEventListener('input', (e) => {
        currentSearch = e.target.value;
        renderTools();
    });

    // 分类菜单
    document.querySelectorAll('.sidebar-item').forEach(item => {
        item.addEventListener('click', () => {
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            currentCategory = item.dataset.category;
            updateCategoryUI();
            renderTools();
            // 移动端隐藏侧边栏
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').style.display = 'none';
            }
        });
    });

    // URL 变化监听
    window.addEventListener('hashchange', handleRoute);
}

// 处理路由
function handleRoute() {
    const hash = window.location.hash.slice(1) || '/';
    
    if (hash.startsWith('/tool/')) {
        const toolId = hash.replace('/tool/', '');
        showDetail(toolId);
    } else if (hash.startsWith('/')) {
        const category = hash.replace('/', '');
        if (['ai', 'dev', 'design'].includes(category)) {
            currentCategory = category;
            // 更新侧边栏选中状态
            document.querySelectorAll('.sidebar-item').forEach(item => {
                item.classList.toggle('active', item.dataset.category === category);
            });
            updateCategoryUI();
        }
        showList();
        renderTools();
    }
}

// 显示列表页
function showList() {
    document.getElementById('listPage').style.display = 'block';
    document.getElementById('detailPage').classList.remove('active');
}

// 显示详情页
function showDetail(toolId) {
    const tool = TOOLS.find(t => t.id === toolId);
    if (!tool) {
        window.location.hash = '/';
        return;
    }

    document.getElementById('listPage').style.display = 'none';
    document.getElementById('detailPage').classList.add('active');

    document.getElementById('detailIcon').innerHTML = tool.icon;
    document.getElementById('detailIcon').style.background = tool.color + '20';
    document.getElementById('detailIcon').style.color = tool.color;
    document.getElementById('detailTitle').textContent = tool.name;
    document.getElementById('detailDesc').textContent = tool.desc;
    document.getElementById('detailVisitBtn').onclick = () => window.open(tool.url, '_blank');
    
    const featuresHtml = tool.features.map(f => `
        <div class="detail-feature">
            <span class="detail-feature-icon">✓</span>
            <span class="detail-feature-text">${f}</span>
        </div>
    `).join('');
    document.getElementById('detailFeatures').innerHTML = featuresHtml;

    // 添加到历史
    toolHistory.push(toolId);
}

// 更新分类 UI
function updateCategoryUI() {
    const titles = { all: '全部工具', ai: 'AI 工具', dev: '开发工具', design: '设计工具' };
    const icons = { all: '📁', ai: '🤖', dev: '💻', design: '🎨' };
    document.getElementById('categoryTitle').textContent = titles[currentCategory];
    document.getElementById('categoryIcon').textContent = icons[currentCategory];
}

// 渲染工具列表
function renderTools() {
    let filtered = TOOLS;

    // 分类筛选
    if (currentCategory !== 'all') {
        filtered = filtered.filter(t => t.category === currentCategory);
    }

    // 搜索筛选
    if (currentSearch.trim()) {
        const q = currentSearch.toLowerCase().trim();
        filtered = filtered.filter(t => 
            t.name.toLowerCase().includes(q) || 
            t.desc.toLowerCase().includes(q)
        );
    }

    const grid = document.getElementById('toolsGrid');
    
    if (filtered.length === 0) {
        grid.innerHTML = `
            <div class="no-result">
                <div class="no-result-icon">🔍</div>
                <p>没有找到匹配的工具</p>
            </div>
        `;
        return;
    }

    grid.innerHTML = filtered.map((t, i) => `
        <div class="tool-card" onclick="goToDetail('${t.id}')" style="animation-delay: ${i * 0.02}s">
            <div class="tool-icon" style="background: ${t.color}20; color: ${t.color}">${t.icon}</div>
            <div class="tool-info">
                <div class="tool-name">
                    ${t.name}
                    <span class="tool-tag">${t.category === 'ai' ? 'AI' : t.category === 'dev' ? '开发' : '设计'}</span>
                </div>
                <div class="tool-desc">${t.desc}</div>
            </div>
        </div>
    `).join('');
}

// 跳转详情
function goToDetail(toolId) {
    window.location.hash = `/tool/${toolId}`;
}

// 返回列表
function goBack() {
    window.history.back();
}

// 返回首页
function goHome() {
    window.location.hash = '/';
}

// 复制详情页URL
function copyDetailUrl() {
    const url = window.location.href;
    navigator.clipboard.writeText(url).then(() => showToast('链接已复制'));
}

// Toast
function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
}

// 切换菜单（移动端）
function toggleMenu() {
    const sidebar = document.getElementById('sidebar');
    sidebar.style.display = sidebar.style.display === 'none' ? 'block' : 'none';
}
</script>
</body>
</html>
