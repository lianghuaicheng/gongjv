// 状态
let currentCategory = 'all';
let currentSearch = '';
let currentTool = null;

// 初始化
document.addEventListener('DOMContentLoaded', () => {
    renderCategories();
    initCounts();
    handleRoute();
    setupEventListeners();
});

// 渲染分类菜单
function renderCategories() {
    const menu = document.getElementById('categoryMenu');
    let html = '';
    
    CATEGORIES.forEach(cat => {
        if (cat.id === 'all') {
            html += `<div class="sidebar-item active" data-category="all">
                <span class="sidebar-item-icon">${cat.icon}</span>
                <span>${cat.name}</span>
                <span class="sidebar-item-count" id="countAll">0</span>
            </div>`;
        } else if (cat.children) {
            cat.children.forEach(child => {
                const count = TOOLS.filter(t => t.category === child.id).length;
                html += `<div class="sidebar-item" data-category="${child.id}">
                    <span class="sidebar-item-icon">${child.icon}</span>
                    <span>${child.name}</span>
                    <span class="sidebar-item-count">${count}</span>
                </div>`;
            });
        }
    });
    
    menu.innerHTML = html;
}

// 初始化计数
function initCounts() {
    const counts = { all: TOOLS.length };
    TOOLS.forEach(t => {
        if (!counts[t.category]) counts[t.category] = 0;
        counts[t.category]++;
    });
    
    Object.keys(counts).forEach(cat => {
        const el = document.getElementById(`count${cat.charAt(0).toUpperCase() + cat.slice(1)}`);
        if (el) el.textContent = counts[cat];
    });
}

// 设置事件监听
function setupEventListeners() {
    document.getElementById('searchInput').addEventListener('input', (e) => {
        currentSearch = e.target.value;
        renderTools();
    });

    document.querySelectorAll('.sidebar-item').forEach(item => {
        item.addEventListener('click', () => {
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            currentCategory = item.dataset.category;
            
            // 如果在详情页，先返回列表页
            document.getElementById('detailPage').classList.remove('active');
            document.getElementById('listPage').style.display = 'block';
            currentTool = null;
            
            updateCategoryUI();
            renderTools();
            
            // 更新 URL
            window.location.hash = '/' + currentCategory;
            
            if (window.innerWidth <= 900) {
                document.getElementById('sidebar').style.display = 'none';
            }
        });
    });

    window.addEventListener('hashchange', handleRoute);
}

// 处理路由
function handleRoute() {
    const hash = window.location.hash.slice(1) || '/';
    
    if (hash.startsWith('/tool/')) {
        const toolId = hash.replace('/tool/', '');
        showDetail(toolId);
    } else if (hash.startsWith('/')) {
        const category = hash.replace('/', '');
        const cat = CATEGORIES.find(c => c.id === category) || CATEGORIES.flatMap(c => c.children || []).find(c => c.id === category);
        if (cat) {
            currentCategory = cat.id;
            document.querySelectorAll('.sidebar-item').forEach(item => {
                item.classList.toggle('active', item.dataset.category === currentCategory);
            });
            updateCategoryUI();
        }
        showList();
        renderTools();
    }
}

// 显示列表页
function showList() {
    document.getElementById('listPage').style.display = 'block';
    document.getElementById('detailPage').classList.remove('active');
}

// 显示详情页
function showDetail(toolId) {
    const tool = TOOLS.find(t => t.id === toolId);
    if (!tool) {
        window.location.hash = '/';
        return;
    }

    currentTool = tool;
    document.getElementById('listPage').style.display = 'none';
    document.getElementById('detailPage').classList.add('active');

    document.getElementById('detailIcon').innerHTML = tool.icon;
    document.getElementById('detailIcon').style.background = tool.color + '20';
    document.getElementById('detailIcon').style.color = tool.color;
    document.getElementById('detailTitle').textContent = tool.name;
    document.getElementById('detailDesc').textContent = tool.desc;
    document.getElementById('detailVisitBtn').onclick = () => window.open(tool.url, '_blank');
    
    const featuresHtml = tool.features.map(f => `
        <div class="detail-feature">
            <span class="detail-feature-icon">✓</span>
            <span class="detail-feature-text">${f}</span>
        </div>
    `).join('');
    document.getElementById('detailFeatures').innerHTML = featuresHtml;
}

// 更新分类 UI
function updateCategoryUI() {
    let title = '全部工具';
    let icon = '📁';
    
    CATEGORIES.forEach(cat => {
        if (cat.id === currentCategory) {
            title = cat.name;
            icon = cat.icon;
        } else if (cat.children) {
            const child = cat.children.find(c => c.id === currentCategory);
            if (child) {
                title = child.name;
                icon = child.icon;
            }
        }
    });
    
    const count = TOOLS.filter(t => t.category === currentCategory).length;
    document.getElementById('categoryTitle').textContent = title;
    document.getElementById('categoryIcon').textContent = icon;
    document.getElementById('categoryCount').textContent = `${count} 个工具`;
}

// 渲染工具列表
function renderTools() {
    let filtered = TOOLS;

    if (currentCategory !== 'all') {
        filtered = filtered.filter(t => t.category === currentCategory);
    }

    if (currentSearch.trim()) {
        const q = currentSearch.toLowerCase().trim();
        filtered = filtered.filter(t => 
            t.name.toLowerCase().includes(q) || 
            t.desc.toLowerCase().includes(q)
        );
    }

    const grid = document.getElementById('toolsGrid');
    
    if (filtered.length === 0) {
        grid.innerHTML = '<div class="no-result"><div class="no-result-icon">🔍</div><p>没有找到匹配的工具</p></div>';
        return;
    }

    grid.innerHTML = filtered.map((t, i) => `
        <div class="tool-card" onclick="goToDetail('${t.id}')" style="animation-delay: ${i * 0.015}s">
            <div class="tool-icon" style="background: ${t.color}20; color: ${t.color}">${t.icon}</div>
            <div class="tool-info">
                <div class="tool-name">
                    ${t.name}
                    <span class="tool-tag">${t.category.split('-')[1] || t.category}</span>
                </div>
                <div class="tool-desc">${t.desc}</div>
            </div>
        </div>
    `).join('');
}

// 跳转详情
function goToDetail(toolId) {
    window.location.hash = `/tool/${toolId}`;
}

// 返回列表
function goBack() {
    window.history.back();
}

// 返回首页
function goHome() {
    window.location.hash = '/';
}

// 复制工具链接
function copyDetailUrl() {
    const url = currentTool ? currentTool.url : window.location.href;
    navigator.clipboard.writeText(url).then(() => showToast('链接已复制'));
}

// Toast
function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
}

// 切换菜单（移动端）
function toggleMenu() {
    const sidebar = document.getElementById('sidebar');
    sidebar.style.display = sidebar.style.display === 'none' ? 'block' : 'none';
}
